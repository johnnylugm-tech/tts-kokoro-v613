# =============================================================================
# 核心運行依賴（Core Runtime Dependencies）
# =============================================================================

fastapi==0.115.12
# ^ 0.109.0+ required (SRS.md §5)
# Web 框架，支援非同步路由與自動 OpenAPI 文件生成
# 依賴：pydantic>=2.0

httpx==0.28.1
# ^ 0.27.0+ required (SRS.md FR-04, SAD.md)
# 非同步 HTTP 客戶端，用於並行請求 Kokoro 後端
# 依賴：anyio, certifi, h2, sniffio, httpcore>=1.0.0

pydantic==2.12.0
# ^ 2.0 required (SAD.md §3)
# 資料驗證與-settings 管理
# 依賴：pydantic-core>=2.12.0, typing-extensions>=4.12.0

pydantic-settings==2.7.1
# ^ 2.0+ compatible
# 環境變數驅動的 settings 配置
# 依賴：pydantic>=2.0

pydub==0.25.1
# ^ 0.25.1 (SRS.md FR-04)
# 音訊處理，支援 MP3 串接與 crossfade 消除接縫
# 依賴：ffmpeg executable (system-level)

uvicorn[standard]==0.34.2
# ^ 0.27.0+ (SAD.md §3)
# ASGI 應用程式伺服器
# extras: standard (含 websockets, h11, httptools, uvloop, watchfiles)

typer==0.15.2
# ^ 0.12.0+ (SRS.md FR-07)
# CLI 框架，建構 tts-v610 命令列工具
# 依賴：click>=8.0.0, shellingham>=1.3.0

python-multipart==0.0.20
# ^ 0.0.9+ required (FastAPI dependency)
# multipart/form-data 解析支援（SSML 檔案上傳用）

redis[hiredis]==5.2.1
# ^ 5.0 required (SRS.md FR-06)
# 非同步 Redis 客戶端，用於可選快取層
# extras: hiredis (C-based parser, higher performance)
# 依賴：hiredis>=2.0

python-dotenv==1.0.1
# ^ 1.0.0+ (config management)
# .env 檔案讀取，環境變數注入

